<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minesweeper</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="game">
      <header class="header">Mini Minesweeper</header>
      <div class="game-shell">
        <div class="status-bar">
          <div class="settings-row">
            <label class="toolbar-field" for="rowInput">
              Rows:
              <input id="rowInput" class="input-row" type="number" value="15" />
            </label>
            <label class="toolbar-field" for="columnInput">
              Columns:
              <input
                id="columnInput"
                class="input-column"
                type="number"
                value="18"
              />
            </label>
            <label class="toolbar-field" for="minesInput">
              Mines:
              <input
                id="minesInput"
                class="input-mines"
                type="number"
                value="18"
              />
            </label>
            <button class="confirm-btn">Refresh</button>
          </div>
          <div class="game-status-row">
            <div class="status-item">
              <span class="status-label">Time:</span>
              <span class="status-value timer"></span>
            </div>
            <div class="status-item">
              <span class="status-label">Flags Left:</span>
              <span class="status-value mines-left"></span>
            </div>
            <button
              class="restart-btn"
              aria-label="Restart"
              title="Restart"
            ></button>
          </div>
        </div>
        <div class="board-wrap">
          <div class="main"></div>
        </div>
        <a
          class="source-link"
          href="https://github.com/AlightSoulmate/html-minesweeper"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="View source on GitHub"
        >
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path
              fill="currentColor"
              d="M12 2C6.48 2 2 6.58 2 12.24c0 4.52 2.87 8.35 6.84 9.71c.5.09.68-.22.68-.49v-1.9c-2.78.62-3.37-1.22-3.37-1.22c-.46-1.18-1.11-1.5-1.11-1.5c-.91-.64.07-.62.07-.62c1 .07 1.53 1.06 1.53 1.06c.89 1.56 2.34 1.11 2.91.85c.09-.66.35-1.11.63-1.36c-2.22-.26-4.55-1.14-4.55-5.06c0-1.12.39-2.03 1.03-2.75c-.1-.26-.45-1.3.1-2.71c0 0 .84-.28 2.75 1.05A9.28 9.28 0 0 1 12 6.96c.85 0 1.71.12 2.51.34c1.91-1.33 2.75-1.05 2.75-1.05c.55 1.41.2 2.45.1 2.71c.64.72 1.03 1.63 1.03 2.75c0 3.93-2.34 4.8-4.57 5.05c.36.32.68.94.68 1.9v2.81c0 .27.18.58.69.49A10.21 10.21 0 0 0 22 12.24C22 6.58 17.52 2 12 2Z"
            />
          </svg>
          <span>View on GitHub</span>
        </a>
      </div>
    </div>
    <script src="./main.js" defer></script>
  </body>
</html>
