<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minesweeper</title>
    <style>
      :root {
        --small-border: 1.5px solid #474545;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f1f1f1;
        font-family: Arial, sans-serif;
      }

      .game {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }

      header {
        font-size: 28px;
        font-weight: 700;
        color: #222;
      }

      .game-shell {
        --board-width: 360px;
        width: min(92vw, calc(var(--board-width) + 34px));
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        background: #d7d1c7;
        border: 1.5px solid #b5ada0;
        border-radius: 8px;
      }

      .status-bar {
        width: min(100%, calc(var(--board-width) + 3px));
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px 10px;
        flex-wrap: wrap;
      }

      .status-item {
        height: 32px;
        display: flex;
        align-items: center;
        gap: 4px;
        color: #222;
      }

      .status-label {
        font-size: 14px;
        color: #333;
      }

      .status-value {
        min-width: 36px;
        font-size: 17px;
        font-weight: 700;
        color: #222;
        font-variant-numeric: tabular-nums;
      }

      .toolbar-field {
        height: 32px;
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 14px;
        color: #333;
      }

      .toolbar-field input {
        width: 54px;
        height: 30px;
        padding: 0 6px;
        border: 1px solid #8f887e;
        border-radius: 4px;
        background: #f8f7f4;
        font-size: 14px;
        color: #222;
      }

      .toolbar-field input:focus {
        border-color: #222;
        outline: 2px solid rgba(34, 34, 34, 0.12);
      }

      .restart-btn,
      .confirm-btn {
        height: 32px;
        padding: 0 10px;
        border: 1px solid #4f4a43;
        border-radius: 4px;
        background: #eee9df;
        color: #222;
        font-size: 14px;
        cursor: pointer;
      }

      .restart-btn:hover,
      .confirm-btn:hover {
        background: #fffaf0;
      }

      .restart-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }

      .board-wrap {
        box-sizing: content-box;
        width: min(var(--board-width), calc(92vw - 37px));
        max-width: 75vw;
        max-height: 75vh;
        overflow: auto;
        border: var(--small-border);
        background: rgb(198, 194, 187);
      }

      .main {
        background-color: rgb(198, 194, 187);
        display: flex;
        flex-direction: column;
      }

      .main > div {
        flex: 1 1 0;
        display: flex;
      }

      .main > div > div {
        flex: 1 1 0;
        min-width: 0;
        min-height: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-top: var(--small-border);
        border-right: var(--small-border);
        font-weight: 700;
        user-select: none;
      }

      .main > div > div:first-child {
        border-left: var(--small-border);
      }

      .main > div:last-child > div {
        border-bottom: var(--small-border);
      }

      .count-1 { color: blue; }
      .count-2 { color: green; }
      .count-3 { color: red; }
      .count-4 { color: navy; }
      .count-5 { color: brown; }
      .count-6 { color: teal; }
      .count-7 { color: black; }
      .count-8 { color: gray; }

      @media (max-width: 820px) {
        body {
          align-items: flex-start;
          padding: 20px;
        }

        .board-wrap {
          max-width: 90vw;
          max-height: 65vh;
        }
      }
    </style>
  </head>

  <body>
    <div class="game">
      <header class="header">Mini Minesweeper</header>
      <div class="game-shell">
        <div class="status-bar">
          <label class="toolbar-field" for="rowInput">
            Rows:
            <input
              id="rowInput"
              class="input-row"
              type="number"
              value="15"
            />
          </label>
          <label class="toolbar-field" for="columnInput">
            Columns:
            <input
              id="columnInput"
              class="input-column"
              type="number"
              value="18"
            />
          </label>
          <label class="toolbar-field" for="minesInput">
            Mines:
            <input
              id="minesInput"
              class="input-mines"
              type="number"
              value="18"
            />
          </label>
          <button class="confirm-btn">Refresh</button>
          <div class="status-item">
            <span class="status-label">Time:</span>
            <span class="status-value timer"></span>
          </div>
          <div class="status-item">
            <span class="status-label">Remaining Mines:</span>
            <span class="status-value mines-left"></span>
          </div>
          <button
            class="restart-btn"
            aria-label="Restart"
            title="Restart"
          ></button>
        </div>
        <div class="board-wrap">
          <div class="main"></div>
        </div>
      </div>
    </div>

    <script>
      let ROW = 15;
      let COLUMN = 18;
      let CELL_SIZE = 20;
      let MINE_COUNT = 40;
      let MINE_PERCENTAGE = 0;
      let MIN_SIZE = 10;
      let MAX_SIZE = 50;
      const MINE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
        <path d="M0 0h24v24H0z" fill="none" />
        <path fill="#000" d="M23 13v-2h-3.07a8 8 0 0 0-1.62-3.9l2.19-2.17l-1.43-1.43l-2.17 2.19A8 8 0 0 0 13 4.07V1h-2v3.07c-1.42.18-2.77.74-3.9 1.62L4.93 3.5L3.5 4.93L5.69 7.1A8 8 0 0 0 4.07 11H1v2h3.07c.18 1.42.74 2.77 1.62 3.9L3.5 19.07l1.43 1.43l2.17-2.19c1.13.88 2.48 1.44 3.9 1.62V23h2v-3.07c1.42-.18 2.77-.74 3.9-1.62l2.17 2.19l1.43-1.43l-2.19-2.17a8 8 0 0 0 1.62-3.9zM12 8a4 4 0 0 0-4 4H6a6 6 0 0 1 6-6z" />
      </svg>
      `;
      const FLAG_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" style="display:block;">
        <path d="M0 0h24v24H0z" fill="none" />
        <path fill="#f20707" d="M5 21V4h9l.4 2H20v10h-7l-.4-2H7v7z" />
      </svg>`;
      const RESTART_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
        <path d="M0 0h24v24H0z" fill="none" />
        <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.252 4v5H9M5.07 8a8 8 0 1 1-.818 6" />
      </svg>
      `;
      let TIMER = 0;
      let TIMERID = null;

      const limitSize = (value) => {
        return Math.min(MAX_SIZE, Math.max(MIN_SIZE, value));
      };

      const createBoard = () => {
        stopTimer();
        setTitle("Mini Minesweeper");

        const main = document.querySelector(".main");
        main.style.width = `${COLUMN * CELL_SIZE}px`;
        main.style.height = `${ROW * CELL_SIZE}px`;
        main.innerHTML = "";
        main.dataset.isClicked = "false";
        const game_shell = document.querySelector(".game-shell");
        game_shell.style.setProperty("--board-width", `${COLUMN * CELL_SIZE}px`);
        initTimer();

        for (let i = 0; i < ROW; i++) {
          const submain = document.createElement("div");
          main.appendChild(submain);
          for (let j = 0; j < COLUMN; j++) {
            const cell = document.createElement("div");
            submain.appendChild(cell);
          }
        }
        const grids = document.querySelectorAll(".main > div > div")
        const remain_mines_status = document.querySelector(
          ".status-value.mines-left",
        );
        remain_mines_status.innerHTML = MINE_COUNT;
        MINE_PERCENTAGE = Math.round((MINE_COUNT * 10000) / (ROW * COLUMN)) / 100
        return grids
      };

      const setMines = (grids) => {
        grids.forEach((grid, index) => {
          grid.dataset.isMine = "false";
          grid.dataset.isClicked = "false";
          grid.dataset.isFlagged = "false";
          grid.dataset.aroundMines = "0";
          grid.dataset.index = index
          grid.dataset.row = Math.floor(index / COLUMN)
          grid.dataset.column = index % COLUMN
        });
        for (let i = 0; i < MINE_COUNT; i++) {
          let num = 0;
          do {
            num = Math.floor(Math.random() * grids.length);
          } while (grids[num].dataset.isMine === "true");
          grids[num].dataset.isMine = "true";
        }
      };

      const setTitle = (text, color = "black") => {
        const title = document.querySelector(".header");
        title.textContent = text;
        title.style.color = color;
      };

      const initTimer = () => {
        let time_status = document.querySelector(".status-value.timer");
        time_status.innerHTML = "000";
        TIMER = 0;
        return time_status;
      };

      const startTimer = () => {
        let time_status = initTimer();
        clearInterval(TIMERID);
        TIMERID = setInterval(() => {
          TIMER++;
          time_status.innerHTML = String(TIMER).padStart(3, "0");
        }, 1000);
      };

      const stopTimer = () => {
        clearInterval(TIMERID);
        TIMERID = null;
      };

      const countAroundMinesNumber = (grids, grid) => {
        if (Number(grid.dataset.aroundMines)) return;
        let aroundMines = 0;
        const row = Number(grid.dataset.row)
        const column = Number(grid.dataset.column)
        for (let i = -1; i <= 1; i++) {
          for (let j = -1; j <= 1; j++) {
            if (i === 0 && j === 0) continue;
            const ni = row + i,
              nj = column + j;
            if (ni < 0 || ni >= ROW || nj < 0 || nj >= COLUMN) continue;
            if (grids[ni * COLUMN + nj].dataset.isMine === "true") {
              aroundMines++;
            }
          }
        }
        grid.dataset.aroundMines = String(aroundMines);
      };

      const BFS = (grids, grid) => {
        const queue = [grid];
        let head = 0;
        while (head < queue.length) {
          const cur = queue[head++];
          const row = Number(cur.dataset.row)
          const column = Number(cur.dataset.column)
          for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
              if ((i | j) === 0) continue;
              const ni = row + i,
                nj = column + j;
              if (ni < 0 || ni >= ROW || nj < 0 || nj >= COLUMN) continue;
              const nxt = grids[ni * COLUMN + nj];
              if (
                nxt.dataset.isMine === "true" ||
                nxt.dataset.isClicked === "true" ||
                nxt.dataset.isFlagged === "true"
              )
                continue;
              // nxt here must not be clickable directly
              countAroundMinesNumber(grids, nxt);
              nxt.style.background = "white";
              nxt.dataset.isClicked = "true";
              if (Number(nxt.dataset.aroundMines) > 0) {
                nxt.innerHTML = nxt.dataset.aroundMines
                nxt.classList.add(`count-${Number(nxt.dataset.aroundMines)}`)
              } else {
                queue.push(nxt);
              }
            }
          }
        }
      };

      const terminate = (main, grids, grid) => {
        grids.forEach((cell) => {
          if (
            cell.dataset.isMine === "true" &&
            cell.dataset.isFlagged === "false"
          ) {
            cell.innerHTML = MINE_SVG;
            if (cell === grid) {
              cell.style.background = "red";
            }
          }
          cell.dataset.isClicked = "true";
        });
        setTitle("Game Over!", "red");
      };

      const checkWin = (grids) => {
        return Array.from(grids).every((grid) => {
          // check unclicked regular grid(s)
          return grid.dataset.isMine === "true" || grid.dataset.isClicked === "true";
        });
      };

      const init = () => {
        const main = document.querySelector(".main");
        const input_row = document.querySelector(".input-row");
        const input_column = document.querySelector(".input-column");
        const input_mines = document.querySelector(".input-mines");
        const confirm_btn = document.querySelector(".confirm-btn");
        const remain_mines_status = document.querySelector(
          ".status-value.mines-left",
        );
        const restart_btn = document.querySelector(".restart-btn");

        input_row.min = MIN_SIZE;
        input_row.max = MAX_SIZE;
        input_column.min = MIN_SIZE;
        input_column.max = MAX_SIZE;
        restart_btn.innerHTML = `${RESTART_SVG}<span>Restart</span>`;

        let grids = createBoard();
        const refreshBoard = () => {
          ROW = limitSize(Number(input_row.value));
          COLUMN = limitSize(Number(input_column.value));
          MINE_COUNT = Number(input_mines.value);
          input_row.value = ROW;
          input_column.value = COLUMN;
          input_mines.value = MINE_COUNT
          grids = createBoard();
        };

        confirm_btn.addEventListener("click", refreshBoard);

        [input_row, input_column, input_mines].forEach((input) => {
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") refreshBoard();
          });
        });

        restart_btn.addEventListener("click", () => {
          stopTimer();
          grids = createBoard();
        });

        main.addEventListener("click", (e) => {
          const grid = e.target.closest(".main > div > div");
          if (!grid || !main.contains(grid)) return;
          if (
            grid.dataset.isClicked === "true" ||
            grid.dataset.isFlagged === "true"
          )
            return;

          grid.dataset.isClicked = "true";
          // start game by fist click
          if (main.dataset.isClicked === "false") {
            startTimer();
            main.dataset.isClicked = "true";
            setMines(grids)
          }
          if (grid.dataset.isMine === "true") {
            terminate(main, grids, grid);
            stopTimer();
          } else {
            grid.style.background = "white";
            countAroundMinesNumber(grids, grid);
            if (Number(grid.dataset.aroundMines) > 0) {
              grid.innerHTML = grid.dataset.aroundMines
              grid.classList.add(`count-${Number(grid.dataset.aroundMines)}`)
            } else {
              BFS(grids, grid);
            }
            if (checkWin(grids)) {
              setTitle("You Win!", "red");
              stopTimer();
            }
          }
        });

        main.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          const grid = e.target.closest(".main > div > div");
          if (!grid || !main.contains(grid)) return;

          if (grid.dataset.isFlagged === "true") {
            grid.dataset.isFlagged = "false";
            grid.innerHTML = "";
            remain_mines_status.innerHTML =
              Number(remain_mines_status.innerHTML) + 1;
          } else if (grid.dataset.isClicked === "false") {
            grid.dataset.isFlagged = "true";
            grid.innerHTML = FLAG_SVG;
            remain_mines_status.innerHTML =
              Number(remain_mines_status.innerHTML) - 1;
          }
        });
      };

      init();
    </script>
  </body>
</html>
