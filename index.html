<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minesweeper</title>
    <style>
      :root {
        --small-border: 1.5px solid #474545;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f1f1f1;
        font-family: Arial, sans-serif;
      }

      .game {
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
      }

      header {
        font-size: 28px;
        font-weight: 700;
        color: #222;
      }

      .status-bar {
        width: 100%;
        max-width: 640px;
        height: 54px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 0 14px;
        background: #ffffff;
        border: 1.5px solid #d0d0d0;
        border-radius: 8px;
      }

      .status-item {
        flex: 1 1 0;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 0 12px;
        background: #f4f4f4;
        border: 1px solid #d6d6d6;
        border-radius: 6px;
      }

      .status-label {
        font-size: 13px;
        color: #666;
      }

      .status-value {
        font-size: 18px;
        font-weight: 700;
        color: #222;
        font-variant-numeric: tabular-nums;
      }

      .restart-btn {
        flex: 0 0 104px;
        height: 36px;
        border: 0;
        border-radius: 6px;
        background: #222;
        color: white;
        font-size: 15px;
        cursor: pointer;
      }

      .restart-btn:hover {
        background: #000;
      }

      .game-layout {
        display: flex;
        gap: 18px;
        align-items: flex-start;
      }

      .board-wrap {
        max-width: 75vw;
        max-height: 75vh;
        overflow: auto;
        border: var(--small-border);
        background: rgb(198, 194, 187);
      }

      .main {
        background-color: rgb(198, 194, 187);
        display: flex;
        flex-direction: column;
      }

      .main > div {
        flex: 1 1 0;
        display: flex;
      }

      .main > div > div {
        flex: 1 1 0;
        min-width: 0;
        min-height: 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        border-top: var(--small-border);
        border-right: var(--small-border);
        font-weight: 700;
        user-select: none;
      }

      .main > div > div:first-child {
        border-left: var(--small-border);
      }

      .main > div:last-child > div {
        border-bottom: var(--small-border);
      }

      .side-panel {
        width: 220px;
        padding: 18px;
        background: #ffffff;
        border: 1.5px solid #d0d0d0;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .panel-title {
        font-size: 18px;
        font-weight: 700;
        color: #222;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .field label {
        font-size: 13px;
        color: #555;
      }

      .field input {
        height: 38px;
        padding: 0 10px;
        border: 1.5px solid #aaa;
        border-radius: 6px;
        font-size: 15px;
        outline: none;
      }

      .field input:focus {
        border-color: #222;
      }

      .confirm-btn {
        height: 40px;
        border: 0;
        border-radius: 6px;
        background: #222;
        color: white;
        font-size: 15px;
        cursor: pointer;
      }

      .confirm-btn:hover {
        background: #000;
      }

      .hint {
        font-size: 12px;
        line-height: 1.5;
        color: #666;
      }

      @media (max-width: 820px) {
        body {
          align-items: flex-start;
          padding: 20px;
        }

        .game-layout {
          flex-direction: column;
          align-items: center;
        }

        .side-panel {
          width: min(90vw, 420px);
        }

        .board-wrap {
          max-width: 90vw;
          max-height: 65vh;
        }
      }
    </style>
  </head>

  <body>
    <div class="game">
      <header>Mini Minesweeper</header>
      <div class="status-bar">
        <div class="status-item">
          <span class="status-label">Time/s</span>
          <span class="status-value timer"></span>
        </div>
        <button class="restart-btn"></button>
        <div class="status-item">
          <span class="status-label">Mines</span>
          <span class="status-value mines-left"></span>
        </div>
      </div>
      <div class="game-layout">
        <div class="board-wrap">
          <div class="main"></div>
        </div>
        <aside class="side-panel">
          <div class="panel-title">Board Settings</div>
          <div class="field">
            <label for="rowInput">Rows</label>
            <input
              class="input-row"
              type="number"
              min="5"
              max="100"
              value="15"
            />
          </div>
          <div class="field">
            <label for="columnInput">Columns</label>
            <input
              class="input-column"
              type="number"
              min="5"
              max="100"
              value="15"
            />
          </div>
          <button class="confirm-btn">Confirm</button>
        </aside>
      </div>
    </div>

    <script>
      let ROW = 15;
      let COLUMN = 18;
      let CELL_SIZE = 25;
      let MINE_PERCENTAGE = 0.17;
      let MIN_SIZE = 5;
      let MAX_SIZE = 25;
      const MINE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
        <path d="M0 0h24v24H0z" fill="none" />
        <path fill="#000" d="M23 13v-2h-3.07a8 8 0 0 0-1.62-3.9l2.19-2.17l-1.43-1.43l-2.17 2.19A8 8 0 0 0 13 4.07V1h-2v3.07c-1.42.18-2.77.74-3.9 1.62L4.93 3.5L3.5 4.93L5.69 7.1A8 8 0 0 0 4.07 11H1v2h3.07c.18 1.42.74 2.77 1.62 3.9L3.5 19.07l1.43 1.43l2.17-2.19c1.13.88 2.48 1.44 3.9 1.62V23h2v-3.07c1.42-.18 2.77-.74 3.9-1.62l2.17 2.19l1.43-1.43l-2.19-2.17a8 8 0 0 0 1.62-3.9zM12 8a4 4 0 0 0-4 4H6a6 6 0 0 1 6-6z" />
      </svg>
      `
      const FLAG_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" style="display:block;">
        <path d="M0 0h24v24H0z" fill="none" />
        <path fill="#f20707" d="M5 21V4h9l.4 2H20v10h-7l-.4-2H7v7z" />
      </svg>`
      const RESTART_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
        <path d="M0 0h24v24H0z" fill="none" />
        <path fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.252 4v5H9M5.07 8a8 8 0 1 1-.818 6" />
      </svg>
      `
      let TIMER = 0
      let TIMERID = null

      const limitSize = (value) => {
        return Math.min(MAX_SIZE, Math.max(MIN_SIZE, value));
      };

      const createBoard = () => {
        const main = document.querySelector(".main");
        main.style.width = `${COLUMN * CELL_SIZE}px`;
        main.style.height = `${ROW * CELL_SIZE}px`;
        main.innerHTML = "";
        main.dataset.isClicked = "false"
        const statusBar = document.querySelector(".status-bar")
        statusBar.style.width = `${COLUMN * CELL_SIZE}px`
        initTimer()

        for (let i = 0; i < ROW; i++) {
          const submain = document.createElement("div");
          main.appendChild(submain);
          for (let j = 0; j < COLUMN; j++) {
            const cell = document.createElement("div");
            submain.appendChild(cell);
          }
        }
        const grids = document.querySelectorAll(".main > div > div");
        setMines(grids);
        return grids;
      };

      const setMines = (grids) => {
        grids.forEach((grid) => {
          grid.dataset.isMine = "false"
          grid.dataset.isClicked = "false"
          grid.dataset.isFlagged = "false"
          grid.dataset.aroundMines = "0"
        });
        for (let i = 0; i < Math.floor(grids.length * MINE_PERCENTAGE); i++) {
          let num = 0;
          do {
            num = Math.floor(Math.random() * grids.length);
          } while (grids[num].dataset.isMine === "true");
          grids[num].dataset.isMine = "true";
        }
        const remain_mines_status = document.querySelector(".status-value.mines-left")
        remain_mines_status.innerHTML = Math.floor(grids.length * MINE_PERCENTAGE)
      };

      const initTimer = () => {
        let time_status = document.querySelector(".status-value.timer")
        time_status.innerHTML = "000"
        TIMER = 0
        return time_status
      }

      const startTimer = () => {
        let time_status = initTimer()
        clearInterval(TIMERID)
        TIMERID = setInterval(() => {
          TIMER ++;
          time_status.innerHTML = String(TIMER).padStart(3, "0")
        }, 1000)
      }

      const stopTimer = () => {
        clearInterval(TIMERID)
        TIMERID = null
        // initTimer()
      }

      const countAroundMinesNumber = (grids, grid) => {
        if (Number(grid.dataset.aroundMines)) return;
        const id = Array.prototype.findIndex.call(grids, (el) => el === grid);
        let aroundMines = 0;
        const row = Math.floor(id / COLUMN);
        const column = id % COLUMN;
        for (let i = -1; i <= 1; i++) {
          for (let j = -1; j <= 1; j++) {
            if (i === 0 && j === 0) continue;
            const ni = row + i,
              nj = column + j;
            if (ni < 0 || ni >= ROW || nj < 0 || nj >= COLUMN) continue;
            if (grids[ni * COLUMN + nj].dataset.isMine === "true") {
              aroundMines++;
            }
          }
        }
        grid.dataset.aroundMines = String(aroundMines);
      };

      const BFS = (grids, grid) => {
        const queue = [grid];
        while (queue.length) {
          const cur = queue.shift();
          const id = Array.prototype.findIndex.call(grids, (el) => el === cur);
          const row = Math.floor(id / COLUMN);
          const column = id % COLUMN;
          for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
              if ((i | j) === 0) continue;
              const ni = row + i,
                nj = column + j;
              if (ni < 0 || ni >= ROW || nj < 0 || nj >= COLUMN) continue;
              const nxt = grids[ni * COLUMN + nj];
              if (
                nxt.dataset.isMine === "true" ||
                nxt.dataset.isClicked === "true" ||
                nxt.dataset.isFlagged === "true"
              )
                continue;
              // nxt here must not be clickable directly
              countAroundMinesNumber(grids, nxt);
              nxt.style.background = "white";
              nxt.dataset.isClicked = "true";
              if (Number(nxt.dataset.aroundMines) > 0) {
                nxt.innerHTML = nxt.dataset.aroundMines;
              } else {
                queue.push(nxt);
              }
            }
          }
        }
      };

      const terminate = (main, grids, grid) => {
        grids.forEach(cell => {
          if(cell.dataset.isMine === "true" && cell.dataset.isFlagged === "false"){
            cell.innerHTML = MINE_SVG;
            if(cell === grid){
              cell.style.background = "red"
            }
          }
          cell.dataset.isClicked = "true"
        })
      }

      const init = () => {
        const main = document.querySelector(".main");
        const option = document.querySelector(".option");
        const input_row = document.querySelector(".input-row");
        const input_column = document.querySelector(".input-column");
        const confirm_btn = document.querySelector(".confirm-btn");
        const remain_mines_status = document.querySelector(".status-value.mines-left")
        const restart_btn = document.querySelector(".restart-btn")

        restart_btn.innerHTML = RESTART_SVG
        let grids = createBoard();
        confirm_btn.addEventListener("click", () => {
          ROW = limitSize(Number(input_row.value));
          COLUMN = limitSize(Number(input_column.value));
          input_row.value = ROW;
          input_column.value = COLUMN;
          grids = createBoard();
        });

        restart_btn.addEventListener("click", () => {
          grids = createBoard()
          stopTimer()
        })

        main.addEventListener("click", (e) => {
          const grid = e.target.closest(".main > div > div");
          if (!grid || !main.contains(grid)) return;
          if (
            grid.dataset.isClicked === "true" ||
            grid.dataset.isFlagged === "true"
          )
            return;

          grid.dataset.isClicked = "true";
          // start game by fist click
          if(main.dataset.isClicked === "false"){
            startTimer()
            main.dataset.isClicked = "true"
          }
          if (grid.dataset.isMine === "true") {
            terminate(main, grids, grid)
            stopTimer()
          } else {
            grid.style.background = "white";
            countAroundMinesNumber(grids, grid);
            if (Number(grid.dataset.aroundMines) > 0) {
              grid.innerHTML = grid.dataset.aroundMines;
            } else {
              BFS(grids, grid);
            }
          }
        });

        main.addEventListener("contextmenu", (e) => {
          e.preventDefault();
          const grid = e.target.closest(".main > div > div");
          if (!grid || !main.contains(grid)) return;

          if (grid.dataset.isFlagged === "true") {
            grid.dataset.isFlagged = "false";
            grid.innerHTML = "";
            remain_mines_status.innerHTML = Number(remain_mines_status.innerHTML) + 1
          } else if (grid.dataset.isClicked === "false") {
            grid.dataset.isFlagged = "true";
            grid.innerHTML = FLAG_SVG;
            remain_mines_status.innerHTML = Number(remain_mines_status.innerHTML) - 1
          }
        });
      };

      init();
    </script>
  </body>
</html>
